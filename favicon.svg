<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- T letter -->
  <rect x="10" y="14" width="18" height="3.5" rx="1.75" fill="url(#accent)"/>
  <rect x="17.25" y="14" width="3.5" height="22" rx="1.75" fill="url(#accent)"/>

  <!-- G letter with open right side -->
  <path d="M36 25 C36 18 44 15 49 18.5" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M49 18.5 C53 22 53 30 49 33.5" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M49 33.5 C45 37 37 36 36 30" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- G horizontal bar -->
  <line x1="44" y1="27" x2="50" y2="27" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Growth arrow - small upward tick bottom right -->
  <polyline points="44,50 48,44 52,47" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
</svg>
